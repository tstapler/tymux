syntax = "proto3";

package tymux.v1;

// TymuxService is the daemon's public API. It's the thing tmux never had:
// a typed, cross-language RPC surface, so a web UI, an AI agent, or a CLI
// can all drive the same multiplexer without scraping terminal escape codes.
service TymuxService {
  rpc CreateSession(CreateSessionRequest) returns (Session);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc KillSession(KillSessionRequest) returns (KillSessionResponse);

  // One-shot structured read of a pane's current screen — the AI-friendly
  // alternative to `tmux capture-pane` (which returns raw text you'd have
  // to re-parse). Cells carry attributes directly.
  rpc CapturePane(CapturePaneRequest) returns (PaneSnapshot);

  // Splits an existing pane into two, nesting a new Split node in its
  // window's Layout tree in the target pane's place. Rejected with
  // failed_precondition (naming the actual/minimum rows+cols) if the
  // resulting leaf would fall below the daemon's hard minimum pane size.
  rpc SplitPane(SplitPaneRequest) returns (Session);
  // Closes one pane. If it was the last pane in its window, the window
  // itself closes (cascading to KillSession if it was also the session's
  // last window) — see ClosePaneResponse.window_closed/session_closed.
  rpc ClosePane(ClosePaneRequest) returns (ClosePaneResponse);
  // Adds a new window (single pane) to an existing session.
  rpc CreateWindow(CreateWindowRequest) returns (Session);
  // Streams the subscribed window's Layout every time its structure or
  // geometry changes, so a client's local model stays in sync without
  // polling ListSessions.
  rpc WatchWindow(WatchWindowRequest) returns (stream WindowLayoutEvent);

  // Bidirectional stream: client sends input/resize events, server streams
  // output back. This is what an interactive attach (human or agent) uses.
  //
  // Contract:
  //  - The first AttachRequest on the stream MUST set the pane_id field of
  //    the oneof; any other first message is rejected with
  //    invalid_argument.
  //  - Detaching means fully cancelling this call (dropping/closing both
  //    directions). Half-closing only the send side does not stop the
  //    receive side or end the attach — the server keeps streaming output
  //    until the whole call is cancelled.
  //  - output_gap=true on an AttachEvent means the server's internal
  //    output broadcast channel dropped frames for this consumer (it fell
  //    behind); some output between the previous and next Output event was
  //    lost. This is not a fatal condition — normal streaming resumes
  //    immediately after.
  //  - Resize is now window-scoped, not pane-scoped (ADR-004): the
  //    daemon tracks every attached client's reported viewport per window
  //    and applies the dimension-wise minimum across all of them, rather
  //    than sizing this one pane to this one client's last report.
  rpc Attach(stream AttachRequest) returns (stream AttachEvent);
}

// Whether a pane's/session's backing process is still running. proto3
// reserves 0 for UNSPECIFIED rather than overloading it as a real state, so
// an absent/default field is never silently misread as LIVE or DEAD.
enum Liveness {
  LIVENESS_UNSPECIFIED = 0;
  LIVENESS_LIVE = 1;
  LIVENESS_DEAD = 2;
}

message Session {
  string id = 1;
  string name = 2;
  repeated Window windows = 3;
  Liveness liveness = 4;
}

// Horizontal = side-by-side (tmux's -h); Vertical = stacked (tmux's
// default -v/no-flag). tymux names its own CLI verbs deliberately rather
// than reusing tmux's -h/-v flags, which are only mnemonic in retrospect.
enum Orientation {
  ORIENTATION_UNSPECIFIED = 0;
  ORIENTATION_HORIZONTAL = 1;
  ORIENTATION_VERTICAL = 2;
}

message Window {
  string id = 1;
  string name = 2;
  Layout layout = 3;
}

// Recursive tree describing one window's pane arrangement — either a
// single pane (leaf) or a Split of exactly two child Layouts. v1.0's
// client-facing rendering model is explicit focus-cycling (one pane's
// output on screen at a time), not composited multi-region rendering;
// this tree exists so a client's local model of pane shape/geometry
// stays correct even so (see WatchWindow).
message Layout {
  oneof node {
    Pane pane = 1;
    Split split = 2;
  }
}

message Split {
  Orientation orientation = 1;
  // Always exactly 2 entries — tymux's split model is strictly binary
  // (nested splits express any N-pane layout tmux itself supports).
  repeated LayoutChild children = 2;
}

message LayoutChild {
  Layout layout = 1;
  float ratio = 2;
}

message Pane {
  string id = 1;
  uint32 rows = 2;
  uint32 cols = 3;
  Liveness liveness = 4;
}

message CreateSessionRequest {
  string name = 1;
  string command = 2; // defaults to $SHELL if empty
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message KillSessionRequest {
  string session_id = 1;
}

message KillSessionResponse {}

message SplitPaneRequest {
  string pane_id = 1; // target leaf to split
  Orientation orientation = 2;
  string command = 3; // defaults to $SHELL if empty
}

message ClosePaneRequest {
  string pane_id = 1;
}

message ClosePaneResponse {
  // Set (non-empty) if closing this pane emptied its window, which
  // therefore closed too. Absent/empty means the pane's sibling(s)
  // survived and the window is still open.
  string window_closed_id = 1;
  string window_closed_name = 2;
  // Set (non-empty) if the closed window was also the session's last
  // window — the whole session cascaded closed (a semantic KillSession).
  string session_closed_id = 3;
  string session_closed_name = 4;
  // The session as it stands after the close, if it still exists (absent
  // if session_closed_id is set).
  Session session = 5;
}

message CreateWindowRequest {
  string session_id = 1;
  string command = 2; // defaults to $SHELL if empty
}

message WatchWindowRequest {
  string window_id = 1;
}

message WindowLayoutEvent {
  Layout layout = 1;
}

message CapturePaneRequest {
  string pane_id = 1;
}

message PaneSnapshot {
  string pane_id = 1;
  uint32 rows = 2;
  uint32 cols = 3;
  repeated Row grid = 4;
  uint32 cursor_row = 5;
  uint32 cursor_col = 6;
  Liveness liveness = 7;
}

message Row {
  repeated Cell cells = 1;
}

message Cell {
  string text = 1; // one grapheme cluster
  uint32 fg = 2;
  uint32 bg = 3;
  uint32 attrs = 4; // bitflags: 1=bold, 2=underline, 4=reverse, 8=italic
}

message AttachRequest {
  oneof payload {
    string pane_id = 1; // first message on the stream: which pane to attach to
    bytes input = 2;    // raw keystrokes to forward to the pty
    Resize resize = 3;
  }
}

message Resize {
  uint32 rows = 1;
  uint32 cols = 2;
}

message AttachEvent {
  oneof payload {
    bytes output = 1; // raw pty output bytes, as they arrive
    PaneSnapshot snapshot = 2;
    bool exited = 3; // the pane's child process has exited; no more output follows
    // The server's output broadcast channel dropped frames for this
    // consumer (it fell behind a burst of pty output). Some output
    // between the previous and next Output event was lost; normal
    // streaming resumes immediately after this event.
    bool output_gap = 4;
  }
}
