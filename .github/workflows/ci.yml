name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - if: matrix.os == 'ubuntu-latest'
        uses: bufbuild/buf-setup-action@v1
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - if: matrix.os == 'ubuntu-latest'
        run: buf lint proto
      - if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check
      - if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace

  musl-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      # Build-only: the musl target has no bundled test runner on
      # ubuntu-latest without extra setup, so this verifies compilation
      # (and thus portable-pty's musl linking) continuously, on every PR.
      - run: cargo build --workspace --target x86_64-unknown-linux-musl

  tag-version-check:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WORKSPACE_VERSION="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match workspace version $WORKSPACE_VERSION"
            exit 1
          fi
