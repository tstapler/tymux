name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      # macos-13 (Intel) deliberately excluded: GitHub-hosted macos-13
      # runners queued indefinitely (50+ min, never started) when tried on
      # this repo — a real capacity/deprecation issue, not flakiness.
      # macos-latest (Apple Silicon) is the only macOS leg for now; see
      # plan.md Unresolved Question #2 for the related ARM64 runner note.
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - if: matrix.os == 'ubuntu-latest'
        uses: bufbuild/buf-setup-action@v1
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - if: matrix.os == 'ubuntu-latest'
        run: buf lint proto
      - if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check
      - if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace

  musl-build:
    # Both musl targets the release workflow ships (Epic 8 Story 8.1) are
    # validated on every PR, not just at release time — aarch64 needs a
    # cross linker the x86_64 leg doesn't (see the per-target step below).
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # Build-only: the musl targets have no bundled test runner on
      # ubuntu-latest without extra setup, so this verifies compilation
      # (and thus portable-pty's musl linking) continuously, on every PR.
      - run: cargo build --workspace --target ${{ matrix.target }}

  ts-client:
    # Story 7.1 Task 4 (buf generate drift check) + Story 7.2 Task 3 /
    # Story 7.3 Task 7 (standing cross-language RPC proof on every PR —
    # plan.md §5 Risk Control pre-mortem.md Failure #5: a proof that isn't
    # re-run on every PR is the same class of gap as a test that doesn't run).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: bufbuild/buf-setup-action@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ts-client
      - run: cargo build --bin tymuxd
      - working-directory: clients/ts
        run: npm install
      - name: buf generate drift check
        working-directory: proto
        run: |
          buf generate
          git diff --exit-code -- ../clients/ts/gen
      - working-directory: clients/ts
        run: npm run build
      - working-directory: clients/ts
        run: npm test
        env:
          TYMUXD_BIN: ${{ github.workspace }}/target/debug/tymuxd

  tag-version-check:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WORKSPACE_VERSION="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match workspace version $WORKSPACE_VERSION"
            exit 1
          fi
