name: Release

on:
  push:
    tags: ["v*"]

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # Both Darwin legs run on macos-latest (Apple Silicon): macOS's
          # native toolchain (Xcode/clang) can cross-link x86_64-apple-darwin
          # from an arm64 host. macos-13 (Intel) is deliberately not used
          # here — GitHub-hosted macos-13 runners queued 50+ min with zero
          # progress when tried on this repo in Epic 1's CI (see ci.yml).
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # aarch64-unknown-linux-musl needs a cross linker the ubuntu-latest
      # runner doesn't ship by default (unlike x86_64-unknown-linux-musl,
      # which only needs musl-tools) — this action wires up the right
      # cross toolchain for both musl targets uniformly.
      - if: contains(matrix.target, 'musl')
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: tymuxd,tymux-cli
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
